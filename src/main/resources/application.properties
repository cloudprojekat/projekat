# ==========================================
# DEVBAZA - KONFIGURACIJA APLIKACIJE
# ==========================================
server.port=${PORT:8080}

# ==========================================
# BAZA PODATAKA
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# HIKARICP - Connection Pool
# ==========================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=DevBazaPool

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==========================================
# JWT
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration.days=7

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost,http://localhost:5500,http://127.0.0.1:5500,http://127.0.0.1}

# ==========================================
# GEMINI API
# ==========================================
gemini.api.key=${GEMINI_API_KEY}

# ==========================================
# RATE LIMITING
# ==========================================
rate.limit.requests-per-minute=60
rate.limit.auth-requests-per-minute=10

# ==========================================
# LOGGING
# ==========================================
logging.level.root=WARN
logging.level.com.example.devbaza=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN